spring:
  # Charge les variables locales depuis un fichier .env quand il est present.
  config:
    import: optional:file:.env[.properties]
  application:
    name: insee-sap-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:MySpace-Sante}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Entrer}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  insee:
    base-url: ${INSEE_BASE_URL:https://api.insee.fr/api-sirene/3.11}
    api-key: ${INSEE_API_KEY:}
    page-size: ${INSEE_PAGE_SIZE:100}
    search-endpoint: /siret

logging:
  level:
    com.myspacesante.insee: INFO